<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UniformERP - Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f8; }
  header {
    background: #1e3a5f; color: white; padding: 14px 24px;
    display: flex; justify-content: space-between; align-items: center;
  }
  header h1 { font-size: 18px; margin: 0; }
  header .user-info { font-size: 13px; }
  header button {
    background: #c0392b; color: white; border: none; padding: 6px 14px;
    border-radius: 4px; cursor: pointer; margin-left: 12px; font-size: 13px;
  }
  nav { max-width: 1000px; margin: 16px auto 0; padding: 0 16px; font-size: 13px; }
  nav a {
    color: white; background: #2c5282; text-decoration: none; margin-right: 10px;
    padding: 8px 14px; border-radius: 6px; display: inline-block; margin-bottom: 8px; font-size: 13px;
  }
  nav a:hover { background: #1e3a5f; }
  .container { max-width: 1000px; margin: 16px auto 24px; padding: 0 16px; }
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
  .kpi-card { background: white; border-radius: 8px; padding: 18px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .kpi-card .label { font-size: 12px; color: #888; margin-bottom: 6px; }
  .kpi-card .value { font-size: 22px; font-weight: 700; color: #1e3a5f; }
  .kpi-card.warn .value { color: #c0392b; }
  .card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 20px; }
  .card h2 { font-size: 16px; margin: 0 0 16px; color: #1e3a5f; }
  @media (max-width: 700px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>

<header>
  <h1>UniformERP — Dashboard</h1>
  <div class="user-info">
    <span id="userLabel"></span>
    <button onclick="logout()">Log Out</button>
  </div>
</header>

<nav>
  <a href="billing.html">New Bill</a>
  <a href="bills.html">Bill History</a>
  <a href="finance.html">Finance</a>
  <a href="inventory.html">Inventory</a>
  <a href="purchase.html">Purchase Entry</a>
  <a href="reports.html" id="navReports">Reports</a>
  <a href="students.html" id="navStudents">Students</a>
  <a href="products.html" id="navProducts">Products</a>
  <a href="schools.html" id="navSchools">Schools</a>
  <a href="suppliers.html" id="navSuppliers">Suppliers</a>
  <a href="colours-sizes.html" id="navColoursSizes">Colours/Sizes</a>
  <a href="users.html" id="navUsers">User Management</a>
  <a href="logs.html" id="navLogs">Audit Logs</a>
</nav>

<div class="container">
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="label">Today's Sales</div>
      <div class="value" id="kpiTodaySales">-</div>
    </div>
    <div class="kpi-card">
      <div class="label">Today's Collection</div>
      <div class="value" id="kpiTodayCollected">-</div>
    </div>
    <div class="kpi-card">
      <div class="label">Bills Today</div>
      <div class="value" id="kpiTodayBills">-</div>
    </div>
    <div class="kpi-card warn">
      <div class="label">Total Outstanding Due</div>
      <div class="value" id="kpiTotalDue">-</div>
    </div>
  </div>

  <div class="card">
    <h2>Sales — Last 7 Days</h2>
    <canvas id="salesChart" height="90"></canvas>
  </div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbwvIJ2hqiz_QfMZonLs0Qs9sCvSo6hYLsbKlyw_oNB8G4IyHjFlJmlG3RbrIkVw_FrS/exec";
  const token = localStorage.getItem("uniformerp_token");

  if (!token) window.location.href = "login.html";

  document.getElementById("userLabel").textContent =
    (localStorage.getItem("uniformerp_name") || "") + " (" + (localStorage.getItem("uniformerp_role") || "") + ")";

  // Hide Owner-only pages from Staff so they don't hit permission errors
  if (localStorage.getItem("uniformerp_role") !== "Owner") {
    ["navUsers", "navLogs", "navReports", "navStudents", "navProducts", "navSchools", "navSuppliers", "navColoursSizes"].forEach(function (id) {
      document.getElementById(id).style.display = "none";
    });
  }

  function logout() { localStorage.clear(); window.location.href = "login.html"; }

  function toDateInputValue(date) {
    return date.toISOString().split("T")[0];
  }

  async function loadTodayKpis() {
    const today = toDateInputValue(new Date());
    const res = await fetch(API_URL + "?action=dailyClosing&token=" + encodeURIComponent(token) + "&date=" + today);
    const data = await res.json();
    if (data.success) {
      document.getElementById("kpiTodaySales").textContent = "₹" + data.data.totalSales;
      document.getElementById("kpiTodayCollected").textContent = "₹" + data.data.totalCollected;
      document.getElementById("kpiTodayBills").textContent = data.data.billCount;
    }
  }

  async function loadDueKpi() {
    const res = await fetch(API_URL + "?action=listDueBills&token=" + encodeURIComponent(token));
    const data = await res.json();
    if (data.success) {
      const total = data.data.reduce(function (s, b) { return s + Number(b.AmountDue || 0); }, 0);
      document.getElementById("kpiTotalDue").textContent = "₹" + total;
    }
  }

  async function loadSalesChart() {
    const to = new Date();
    const from = new Date();
    from.setDate(to.getDate() - 6);

    const url = API_URL + "?action=salesSummaryReport&token=" + encodeURIComponent(token) +
      "&fromDate=" + toDateInputValue(from) + "&toDate=" + toDateInputValue(to);
    const res = await fetch(url);
    const data = await res.json();
    if (!data.success) return;

    const labels = [];
    const salesByDate = {};
    data.data.rows.forEach(function (r) { salesByDate[r.date] = r.totalSales; });
    const values = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const label = d.toLocaleDateString();
      labels.push(label);
      values.push(salesByDate[label] || 0);
    }

    new Chart(document.getElementById("salesChart"), {
      type: "bar",
      data: {
        labels: labels,
        datasets: [{
          label: "Sales (₹)",
          data: values,
          backgroundColor: "#2c5282"
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true } }
      }
    });
  }

  loadTodayKpis();
  loadDueKpi();
  loadSalesChart();
</script>

</body>
</html>
