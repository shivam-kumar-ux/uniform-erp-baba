<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BABA General Store - Receipt</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f8; }
  header {
    background: #1e3a5f; color: white; padding: 14px 24px;
    display: flex; justify-content: space-between; align-items: center;
  }
  header h1 { font-size: 18px; margin: 0; }
  header button {
    background: #c0392b; color: white; border: none; padding: 6px 14px;
    border-radius: 4px; cursor: pointer; margin-left: 12px; font-size: 13px;
  }
  nav { max-width: 700px; margin: 16px auto 0; padding: 0 16px; font-size: 13px; }
  nav a { color: #2c5282; text-decoration: none; margin-right: 16px; }
  .container { max-width: 700px; margin: 16px auto 24px; padding: 0 16px; }
  .receipt-card {
    background: white; border-radius: 8px; padding: 30px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .shop-header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #1e3a5f; padding-bottom: 14px; }
  .shop-header h2 { margin: 0; color: #1e3a5f; font-size: 22px; }
  .shop-header p { margin: 4px 0 0; color: #666; font-size: 13px; }
  .meta-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 16px; color: #444; }
  .student-block { background: #f4f6f8; border-radius: 6px; padding: 12px; margin-bottom: 16px; font-size: 13px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 16px; }
  th, td { text-align: left; padding: 8px; border-bottom: 1px solid #eee; }
  th { color: #666; }
  .totals-block { margin-left: auto; width: 260px; font-size: 14px; }
  .totals-block div { display: flex; justify-content: space-between; padding: 4px 0; }
  .totals-block .grand { font-weight: 700; font-size: 16px; border-top: 1px solid #333; padding-top: 8px; margin-top: 4px; }
  .status-tag { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 12px; font-weight: 600; }
  .status-Paid { background: #e8f5e9; color: #1e7e34; }
  .status-Partial { background: #fff8e1; color: #b8860b; }
  .status-Due { background: #fdecea; color: #c0392b; }
  .actions { text-align: center; margin-top: 20px; }
  .btn-primary {
    background: #2c5282; color: white; border: none; padding: 10px 24px;
    border-radius: 4px; font-size: 14px; cursor: pointer; margin: 6px;
  }
  .btn-whatsapp { background: #1e7e34; }
  .btn-whatsapp:disabled { background: #999; cursor: not-allowed; }
  .footer-note { text-align: center; font-size: 12px; color: #999; margin-top: 20px; }
  .phone-note { text-align: center; font-size: 12px; color: #999; margin-top: 4px; }

  /* Print-only duplicate-copy layout, hidden on screen */
  #printCopies { display: none; }
  .copy-label {
    text-align: center; font-weight: 700; font-size: 11px; color: #666;
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
  }
  .cut-line {
    text-align: center; font-size: 10px; color: #999; margin: 10px 0;
    border-top: 1px dashed #999; padding-top: 4px;
  }
  .print-copy { padding: 14px 0; }

  @media print {
    header, nav, .actions { display: none; }
    body { background: white; }
    .container { max-width: 100%; margin: 0; padding: 0; }
    #screenView { display: none; }
    #printCopies { display: block; }
    .receipt-card { box-shadow: none; padding: 0; }
  }
</style>
</head>
<body>

<header>
  <h1><strong>BABA General Store</strong> — Receipt</h1>
  <div><button onclick="logout()">Log Out</button></div>
</header>

<nav>
  <a href="dashboard.html">Dashboard</a>
  <a href="billing.html">New Bill</a>
</nav>

<div class="container">
  <div id="screenView">
    <div class="receipt-card" id="receiptCard">
      <div class="shop-header">
        <h2>BABA General Store</h2>
        <p>Uniform Shop — Shahpur &amp; Telaiya Dam</p>
      </div>
      <div id="content">Loading receipt...</div>
    </div>
  </div>

  <!-- Print-only: two copies stacked on one page, split by a cut line -->
  <div id="printCopies"></div>

  <div class="actions">
    <button class="btn-primary" onclick="window.print()">Print Receipt (2 Copies)</button>
    <button class="btn-primary btn-whatsapp" id="whatsappBtn" onclick="sendWhatsApp()" disabled>Send on WhatsApp</button>
    <button class="btn-primary" style="background:#555;" onclick="window.location.href='billing.html'">New Bill</button>
  </div>
  <div class="phone-note" id="phoneNote"></div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbwvIJ2hqiz_QfMZonLs0Qs9sCvSo6hYLsbKlyw_oNB8G4IyHjFlJmlG3RbrIkVw_FrS/exec";
  const token = localStorage.getItem("uniformerp_token");
  let currentBill = null, currentStudent = null, currentItems = null;

  if (!token) window.location.href = "login.html";

  function logout() { localStorage.clear(); window.location.href = "login.html"; }

  function escapeHtml(str) {
    return String(str || "").replace(/[&<>"]/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
    });
  }

  function getBillIdFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get("billId") || localStorage.getItem("lastBillId");
  }

  /** Builds the inner HTML for one self-contained receipt (shop header + details), reused for both screen and print copies. */
  function buildReceiptHtml(bill, student, items, copyLabel) {
    let itemsHtml = "";
    items.forEach(function (it) {
      itemsHtml +=
        "<tr>" +
        "<td>" + escapeHtml(it.ProductName) + " (" + escapeHtml(it.ColourName) + ", " + escapeHtml(it.SizeName) + ")</td>" +
        "<td>" + it.Qty + "</td>" +
        "<td>₹" + it.UnitPrice + "</td>" +
        "<td>₹" + it.LineTotal + "</td>" +
        "</tr>";
    });

    const billDate = new Date(bill.BillDate).toLocaleDateString();

    return (
      (copyLabel ? "<div class='copy-label'>" + escapeHtml(copyLabel) + "</div>" : "") +
      "<div class='shop-header'>" +
        "<h2>BABA General Store</h2>" +
        "<p>Uniform Shop — Shahpur &amp; Telaiya Dam</p>" +
      "</div>" +
      "<div class='meta-row'>" +
        "<span>Bill No: <strong>" + escapeHtml(bill.BillNo) + "</strong></span>" +
        "<span>Date: " + billDate + "</span>" +
      "</div>" +
      "<div class='student-block'>" +
        "<strong>" + escapeHtml(student.StudentName || "Walk-in Customer") + "</strong><br>" +
        "Admission No: " + escapeHtml(student.AdmissionNo || "-") + "<br>" +
        (student.ParentPhone ? "Phone: " + escapeHtml(student.ParentPhone) : "") +
      "</div>" +
      "<table>" +
        "<thead><tr><th>Item</th><th>Qty</th><th>Rate</th><th>Amount</th></tr></thead>" +
        "<tbody>" + itemsHtml + "</tbody>" +
      "</table>" +
      "<div class='totals-block'>" +
        "<div><span>Total Amount</span><span>₹" + bill.TotalAmount + "</span></div>" +
        "<div><span>Amount Paid</span><span>₹" + bill.AmountPaid + "</span></div>" +
        "<div class='grand'><span>Amount Due</span><span>₹" + bill.AmountDue + "</span></div>" +
      "</div>" +
      "<div style='text-align:center; margin-top:14px;'>" +
        "<span class='status-tag status-" + bill.Status + "'>" + bill.Status + "</span>" +
      "</div>" +
      "<div class='footer-note'>Thank you for shopping with us — BABA General Store</div>"
    );
  }

  async function loadReceipt() {
    const billId = getBillIdFromUrl();
    if (!billId) {
      document.getElementById("content").innerHTML = "<p>No bill specified.</p>";
      return;
    }

    const res = await fetch(API_URL + "?action=getBillDetails&token=" + encodeURIComponent(token) + "&billId=" + encodeURIComponent(billId));
    const data = await res.json();

    if (!data.success) {
      document.getElementById("content").innerHTML = "<p>" + escapeHtml(data.message) + "</p>";
      return;
    }

    currentBill = data.data.bill;
    currentStudent = data.data.student;
    currentItems = data.data.items;

    // Screen view: one copy, no label
    document.getElementById("content").innerHTML = buildReceiptHtml(currentBill, currentStudent, currentItems, "");

    // Print view: two full copies stacked on one page, separated by a cut line
    document.getElementById("printCopies").innerHTML =
      "<div class='print-copy'>" + buildReceiptHtml(currentBill, currentStudent, currentItems, "Parent's Copy") + "</div>" +
      "<div class='cut-line'>✂ - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - ✂</div>" +
      "<div class='print-copy'>" + buildReceiptHtml(currentBill, currentStudent, currentItems, "Shopkeeper's Copy") + "</div>";

    // Enable WhatsApp button only if a parent phone number exists
    const whatsappBtn = document.getElementById("whatsappBtn");
    if (currentStudent.ParentPhone) {
      whatsappBtn.disabled = false;
    } else {
      whatsappBtn.disabled = true;
      document.getElementById("phoneNote").textContent = "No parent phone number on file for this student — add one via Students page to enable WhatsApp sending.";
    }
  }

  function normalizePhone(raw) {
    let digits = String(raw || "").replace(/\D/g, "");
    if (digits.length === 10) digits = "91" + digits; // default to India country code
    return digits;
  }

  function sendWhatsApp() {
    if (!currentBill || !currentStudent) return;
    const phone = normalizePhone(currentStudent.ParentPhone);
    if (!phone) {
      alert("No parent phone number available for this student.");
      return;
    }

    const billDate = new Date(currentBill.BillDate).toLocaleDateString();
    let itemLines = "";
    currentItems.forEach(function (it) {
      itemLines += "- " + it.ProductName + " (" + it.ColourName + ", " + it.SizeName + ") x" + it.Qty + " = ₹" + it.LineTotal + "\n";
    });

    const message =
      "BABA General Store — Bill Receipt\n" +
      "Bill No: " + currentBill.BillNo + "\n" +
      "Date: " + billDate + "\n" +
      "Student: " + (currentStudent.StudentName || "-") + " (Adm# " + (currentStudent.AdmissionNo || "-") + ")\n\n" +
      "Items:\n" + itemLines + "\n" +
      "Total Amount: ₹" + currentBill.TotalAmount + "\n" +
      "Amount Paid: ₹" + currentBill.AmountPaid + "\n" +
      "Amount Due: ₹" + currentBill.AmountDue + "\n\n" +
      "Thank you for shopping with us!";

    const url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);
    window.open(url, "_blank");
  }

  loadReceipt();
</script>

</body>
</html>
