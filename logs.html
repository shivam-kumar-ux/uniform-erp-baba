<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BABA General Store - Audit Logs</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f8; }
  header {
    background: #1e3a5f; color: white; padding: 14px 24px;
    display: flex; justify-content: space-between; align-items: center;
  }
  header h1 { font-size: 18px; margin: 0; }
  header button {
    background: #c0392b; color: white; border: none; padding: 6px 14px;
    border-radius: 4px; cursor: pointer; margin-left: 12px; font-size: 13px;
  }
  nav { max-width: 1000px; margin: 16px auto 0; padding: 0 16px; font-size: 13px; }
  nav a { color: #2c5282; text-decoration: none; margin-right: 16px; }
  .container { max-width: 1000px; margin: 16px auto 24px; padding: 0 16px; }
  .card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .card h2 { font-size: 16px; margin: 0 0 16px; color: #1e3a5f; }
  .toolbar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .toolbar input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; min-width: 220px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th, td { text-align: left; padding: 7px 9px; border-bottom: 1px solid #eee; }
  th { color: #666; font-weight: 600; }
  .note { font-size: 12px; color: #888; margin-top: 10px; }
</style>
</head>
<body>

<header>
  <h1><strong>BABA General Store</strong> — Audit Logs</h1>
  <div><button onclick="logout()">Log Out</button></div>
</header>

<nav>
  <a href="dashboard.html">Dashboard</a>
  <a href="reports.html">Reports</a>
</nav>

<div class="container">
  <div class="card">
    <h2>Recent Activity (latest 200 actions)</h2>
    <div class="toolbar">
      <input id="searchBox" placeholder="Filter by action type (e.g. Login, Add Product)..." oninput="renderTable()">
    </div>
    <table>
      <thead><tr><th>Date</th><th>Time</th><th>User</th><th>Action</th><th>Record</th><th>Details</th></tr></thead>
      <tbody id="logsBody"><tr><td colspan="6">Loading...</td></tr></tbody>
    </table>
    <div class="note">Showing most recent activity first. This log tracks logins, and every add/update/status-change across the system.</div>
  </div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbwvIJ2hqiz_QfMZonLs0Qs9sCvSo6hYLsbKlyw_oNB8G4IyHjFlJmlG3RbrIkVw_FrS/exec";
  const token = localStorage.getItem("uniformerp_token");
  let allLogs = [];

  if (!token) window.location.href = "login.html";
  if (localStorage.getItem("uniformerp_role") !== "Owner") {
    alert("This page is only accessible to the Owner.");
    window.location.href = "dashboard.html";
  }

  function logout() { localStorage.clear(); window.location.href = "login.html"; }

  function escapeHtml(str) {
    return String(str || "").replace(/[&<>"]/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
    });
  }

  async function loadLogs() {
    const res = await fetch(API_URL + "?action=listLogs&token=" + encodeURIComponent(token));
    const data = await res.json();
    if (!data.success) {
      document.getElementById("logsBody").innerHTML = "<tr><td colspan='6'>" + escapeHtml(data.message) + "</td></tr>";
      return;
    }
    allLogs = data.data;
    renderTable();
  }

  function renderTable() {
    const search = document.getElementById("searchBox").value.trim().toLowerCase();
    let rows = allLogs;
    if (search) {
      rows = rows.filter(function (l) { return String(l.Action).toLowerCase().indexOf(search) !== -1; });
    }

    const tbody = document.getElementById("logsBody");
    tbody.innerHTML = "";
    if (rows.length === 0) {
      tbody.innerHTML = "<tr><td colspan='6'>No matching log entries.</td></tr>";
      return;
    }
    rows.forEach(function (l) {
      const tr = document.createElement("tr");
      tr.innerHTML =
        "<td>" + escapeHtml(l.Date) + "</td>" +
        "<td>" + escapeHtml(l.Time) + "</td>" +
        "<td>" + escapeHtml(l.UserName) + "</td>" +
        "<td>" + escapeHtml(l.Action) + "</td>" +
        "<td>" + escapeHtml(l.RecordChanged) + "</td>" +
        "<td>" + escapeHtml(l.NewValue) + "</td>";
      tbody.appendChild(tr);
    });
  }

  loadLogs();
</script>

</body>
</html>
