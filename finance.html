<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UniformERP - Finance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f8; }
  header {
    background: #1e3a5f; color: white; padding: 14px 24px;
    display: flex; justify-content: space-between; align-items: center;
  }
  header h1 { font-size: 18px; margin: 0; }
  header button {
    background: #c0392b; color: white; border: none; padding: 6px 14px;
    border-radius: 4px; cursor: pointer; margin-left: 12px; font-size: 13px;
  }
  nav { max-width: 1000px; margin: 16px auto 0; padding: 0 16px; font-size: 13px; }
  nav a { color: #2c5282; text-decoration: none; margin-right: 16px; }
  .container { max-width: 1000px; margin: 16px auto 24px; padding: 0 16px; }
  .card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 20px; }
  .card h2 { font-size: 16px; margin: 0 0 16px; color: #1e3a5f; }
  .toolbar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: end; }
  .toolbar select, .toolbar input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
  .toolbar label { font-size: 12px; font-weight: 600; color: #444; display: block; margin-bottom: 4px; }
  .summary { display: flex; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; }
  .summary-box { background: #f4f6f8; border-radius: 6px; padding: 10px 16px; font-size: 13px; }
  .summary-box strong { display: block; font-size: 18px; color: #1e3a5f; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #eee; }
  th { color: #666; font-weight: 600; }
  .link-btn { background: #2c5282; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .mode-row { display: flex; gap: 16px; font-size: 13px; margin-top: 8px; }
  .mode-box { background: #e8f0fe; border-radius: 6px; padding: 8px 14px; }
  #msg { font-size: 13px; margin-top: 10px; display: none; }
  #msg.error { color: #c0392b; }
  #msg.success { color: #1e7e34; }

  .modal-overlay {
    display: none; position: fixed; top:0; left:0; right:0; bottom:0;
    background: rgba(0,0,0,0.4); align-items: center; justify-content: center;
  }
  .modal-box { background: white; border-radius: 8px; padding: 24px; width: 320px; }
  .modal-box h3 { margin: 0 0 14px; font-size: 15px; }
  .modal-box label { font-size: 12px; font-weight: 600; display: block; margin-bottom: 4px; }
  .modal-box input, .modal-box select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 12px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-secondary { background: #888; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
</style>
</head>
<body>

<header>
  <h1>UniformERP — Finance</h1>
  <div><button onclick="logout()">Log Out</button></div>
</header>

<nav>
  <a href="billing.html">New Bill</a>
  <a href="bills.html">Bill History</a>
  <a href="inventory.html">Inventory</a>
</nav>

<div class="container">
  <div class="card">
    <h2>Daily Closing Summary</h2>
    <div class="toolbar">
      <div><label>Date</label><input id="closingDate" type="date"></div>
      <div><label>Branch</label>
        <select id="closingBranch">
          <option value="">All Branches</option>
          <option value="Shahpur">Shahpur</option>
          <option value="Telaiya Dam">Telaiya Dam</option>
        </select>
      </div>
      <button class="link-btn" onclick="loadClosing()">Refresh</button>
    </div>
    <div class="summary">
      <div class="summary-box">Bills Today<strong id="closingBillCount">-</strong></div>
      <div class="summary-box">Total Sales Value<strong id="closingSales">-</strong></div>
      <div class="summary-box">Total Collected<strong id="closingCollected">-</strong></div>
    </div>
    <div class="mode-row" id="modeBreakdown"></div>
  </div>

  <div class="card">
    <h2>Outstanding Dues</h2>
    <table>
      <thead><tr><th>Bill No</th><th>Date</th><th>Student</th><th>Admission No.</th><th>Branch</th><th>Total</th><th>Paid</th><th>Due</th><th></th></tr></thead>
      <tbody id="duesBody"><tr><td colspan="9">Loading...</td></tr></tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <h3>Collect Payment — <span id="modalBillNo"></span></h3>
    <label>Amount Due: ₹<span id="modalDue"></span></label>
    <label>Amount Received</label>
    <input id="modalAmount" type="number" min="0" step="0.01">
    <label>Payment Mode</label>
    <select id="modalMode"><option>Cash</option><option>UPI</option><option>Card</option></select>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="link-btn" onclick="submitPayment()">Confirm</button>
    </div>
    <div id="msg"></div>
  </div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbwvIJ2hqiz_QfMZonLs0Qs9sCvSo6hYLsbKlyw_oNB8G4IyHjFlJmlG3RbrIkVw_FrS/exec";
  const token = localStorage.getItem("uniformerp_token");
  let activeBillId = null;

  if (!token) window.location.href = "login.html";

  document.getElementById("closingDate").valueAsDate = new Date();

  function logout() { localStorage.clear(); window.location.href = "login.html"; }

  function escapeHtml(str) {
    return String(str || "").replace(/[&<>"]/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
    });
  }

  function showMsg(text, type) {
    const el = document.getElementById("msg");
    el.textContent = text; el.className = type; el.style.display = "block";
    setTimeout(function () { el.style.display = "none"; }, 3500);
  }

  async function loadClosing() {
    const date = document.getElementById("closingDate").value;
    const branch = document.getElementById("closingBranch").value;
    const url = API_URL + "?action=dailyClosing&token=" + encodeURIComponent(token) +
      "&date=" + encodeURIComponent(date) + (branch ? "&branch=" + encodeURIComponent(branch) : "");
    const res = await fetch(url);
    const data = await res.json();
    if (!data.success) { showMsg(data.message, "error"); return; }

    const d = data.data;
    document.getElementById("closingBillCount").textContent = d.billCount;
    document.getElementById("closingSales").textContent = "₹" + d.totalSales;
    document.getElementById("closingCollected").textContent = "₹" + d.totalCollected;

    const modeDiv = document.getElementById("modeBreakdown");
    modeDiv.innerHTML = "";
    Object.keys(d.collectedByMode).forEach(function (mode) {
      const box = document.createElement("div");
      box.className = "mode-box";
      box.textContent = mode + ": ₹" + d.collectedByMode[mode];
      modeDiv.appendChild(box);
    });
    if (Object.keys(d.collectedByMode).length === 0) {
      modeDiv.innerHTML = "<span style='color:#999;'>No payments collected on this date.</span>";
    }
  }

  async function loadDues() {
    const res = await fetch(API_URL + "?action=listDueBills&token=" + encodeURIComponent(token));
    const data = await res.json();
    if (!data.success) { showMsg(data.message, "error"); return; }

    const tbody = document.getElementById("duesBody");
    tbody.innerHTML = "";
    if (data.data.length === 0) {
      tbody.innerHTML = "<tr><td colspan='9'>No outstanding dues. 🎉</td></tr>";
      return;
    }
    data.data.forEach(function (b) {
      const tr = document.createElement("tr");
      const billDate = new Date(b.BillDate).toLocaleDateString();
      tr.innerHTML =
        "<td>" + escapeHtml(b.BillNo) + "</td>" +
        "<td>" + billDate + "</td>" +
        "<td>" + escapeHtml(b.StudentName) + "</td>" +
        "<td>" + escapeHtml(b.AdmissionNo) + "</td>" +
        "<td>" + escapeHtml(b.Branch) + "</td>" +
        "<td>₹" + b.TotalAmount + "</td>" +
        "<td>₹" + b.AmountPaid + "</td>" +
        "<td>₹" + b.AmountDue + "</td>" +
        "<td><button class='link-btn' onclick=\"openModal('" + b.BillID + "','" + escapeHtml(b.BillNo) + "'," + b.AmountDue + ")\">Collect</button></td>";
      tbody.appendChild(tr);
    });
  }

  function openModal(billId, billNo, due) {
    activeBillId = billId;
    document.getElementById("modalBillNo").textContent = billNo;
    document.getElementById("modalDue").textContent = due;
    document.getElementById("modalAmount").value = due;
    document.getElementById("modalOverlay").style.display = "flex";
  }

  function closeModal() {
    document.getElementById("modalOverlay").style.display = "none";
    activeBillId = null;
  }

  async function submitPayment() {
    const amount = document.getElementById("modalAmount").value;
    const mode = document.getElementById("modalMode").value;
    if (!amount || Number(amount) <= 0) { showMsg("Enter a valid amount", "error"); return; }

    const params = new URLSearchParams({
      action: "collectPayment", token: token, billId: activeBillId, amount: amount, paymentMode: mode
    });
    const res = await fetch(API_URL + "?" + params.toString());
    const data = await res.json();
    if (data.success) {
      closeModal();
      loadDues();
      loadClosing();
    } else {
      showMsg(data.message || "Failed to record payment.", "error");
    }
  }

  loadClosing();
  loadDues();
</script>

</body>
</html>
